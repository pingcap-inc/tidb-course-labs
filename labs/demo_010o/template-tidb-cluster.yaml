# TiDB Cluster on AWS EKS via TiDB Operator
# Minimal topology for lab: 3 PD, 3 TiKV, 2 TiDB
apiVersion: pingcap.com/v1alpha1
kind: TidbCluster
metadata:
  name: tidb-demo
spec:
  version: v<TIDB_VERSION>
  timezone: UTC
  pvReclaimPolicy: Delete
  enableDynamicConfiguration: true
  configUpdateStrategy: RollingUpdate
  discovery: {}
  helper:
    image: alpine:3.16.0
  pd:
    baseImage: pingcap/pd
    maxFailoverCount: 0
    replicas: 3
    storageClassName: gp2
    requests:
      storage: "20Gi"
    config: {}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: az
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: pd
            app.kubernetes.io/instance: tidb-demo
  tikv:
    baseImage: pingcap/tikv
    maxFailoverCount: 0
    evictLeaderTimeout: 1m
    replicas: 3
    storageClassName: gp2
    requests:
      storage: "50Gi"
    config:
      storage:
        # In basic examples, we set this to avoid using too much storage.
        reserve-space: "0MB"
      rocksdb:
        # In basic examples, we set this to avoid the following error in some Kubernetes clusters:
        # "the maximum number of open file descriptors is too small, got 1024, expect greater or equal to 82920"
        max-open-files: 256
      raftdb:
        max-open-files: 256
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: az
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: tikv
            app.kubernetes.io/instance: tidb-demo
  tidb:
    baseImage: pingcap/tidb
    maxFailoverCount: 0
    replicas: 2
    storageClassName: gp2
    requests:
      storage: "20Gi"
    service:
      type: ClusterIP
    config: {}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: az
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: tidb
            app.kubernetes.io/instance: tidb-demo
