# TiDB Cluster on AWS EKS via TiDB Operator
# Topology: 2 TiDB, 3 PD, 3 TiKV, 1 TiFlash
# For reusing an existing NLB: TiDB service is NodePort; apply template-targetgroupbinding.yaml
#   with your existing target group ARN so the AWS LB Controller registers this service to that TG.
apiVersion: pingcap.com/v1alpha1
kind: TidbCluster
metadata:
  name: tidb-demo
spec:
  version: v<TIDB_VERSION>
  timezone: UTC
  pvReclaimPolicy: Delete
  enableDynamicConfiguration: true
  configUpdateStrategy: RollingUpdate
  discovery: {}
  helper:
    image: alpine:3.16.0
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: az
  pd:
    baseImage: pingcap/pd
    maxFailoverCount: 0
    replicas: 3
    nodeSelector:
      dedicated: pd
    tolerations:
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: pd
    storageClassName: gp2
    requests:
      storage: "20Gi"
    config: {}
  tikv:
    baseImage: pingcap/tikv
    maxFailoverCount: 0
    evictLeaderTimeout: 1m
    replicas: 3
    nodeSelector:
      dedicated: tikv
    tolerations:
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: tikv
    storageClassName: gp2
    requests:
      storage: "50Gi"
    config:
      storage:
        reserve-space: "0MB"
      rocksdb:
        max-open-files: 1024
      raftdb:
        max-open-files: 1024
  tidb:
    baseImage: pingcap/tidb
    maxFailoverCount: 0
    replicas: 2
    nodeSelector:
      dedicated: tidb
    tolerations:
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: tidb
    # TiDB is stateless; no PVC needed
    service:
      type: NodePort
      # TiDBServiceSpec (spec.tidb.service): mysqlNodePort + statusNodePort per tidb-operator API
      # https://github.com/pingcap/tidb-operator/blob/master/docs/api-references/docs.md
      exposeStatus: true
      mysqlNodePort: 30400 # MySQL (4000) on node -> 30400
      statusNodePort: 31080 # Status (10080) on node -> 31080 (for NLB health check)
      # If you prefer creating a new NLB via Service(type=LoadBalancer), configure it under spec.tidb.service.
      # type: LoadBalancer
      #   annotations:
      #     service.beta.kubernetes.io/aws-load-balancer-name: "<NLB_NAME>"
      #     service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      #     service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
      #     service.beta.kubernetes.io/aws-load-balancer-internal: "true"
      #     service.beta.kubernetes.io/aws-load-balancer-target-group-arn: "<TG_ARN>"
      #     service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "instance"
      #     service.beta.kubernetes.io/aws-load-balancer-target-node-labels: "kubernetes.io/os=linux"
      #     service.beta.kubernetes.io/aws-load-balancer-target-group-attributes: "deregistration_delay.timeout_seconds=60,stickiness.enabled=false,preserve_client_ip.enabled=true"
      #     service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "TCP"
      #     service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "10080"
      #     service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
      #     service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "5"
      #     service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
      #     service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "2"
      #     service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    config: {}
  tiflash:
    baseImage: pingcap/tiflash
    maxFailoverCount: 0
    replicas: 1
    nodeSelector:
      dedicated: tiflash
    tolerations:
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: tiflash
    storageClaims:
      - resources:
          requests:
            storage: 70Gi
        storageClassName: gp2
